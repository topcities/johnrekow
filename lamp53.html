<title>Lamp 53 - SeasideWall</title>
<meta http-equiv="Expires" content="Tue, 04 Dec 1997 21:29:02 GMT">
<meta http-equiv="Pragma" content="no-cache">

canvas{width:100vw;height:100vh;display:block}

<body>
<canvas id="c"></canvas>

<script id="frag" type="x-shader/x-fragment">#version 300 es
precision highp float;
out vec4 O;

uniform float time;
uniform vec2 resolution;
uniform vec2 move;

#define T time
#define R resolution

float hash(float n){return fract(sin(n)*43758.5453123);}
float n2(vec2 p){
    vec2 i=floor(p),f=fract(p);
    f=f*f*(3.-2.*f);
    float a=hash(dot(i,vec2(1,57)));
    float b=hash(dot(i+vec2(1,0),vec2(1,57)));
    float c=hash(dot(i+vec2(0,1),vec2(1,57)));
    float d=hash(dot(i+vec2(1,1),vec2(1,57)));
    return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);
}

float coast(float z){
    return -30.0 + sin(z*.008)*12.0 + sin(z*.031)*4.0;
}

float terrain(vec2 xz){
    float c=coast(xz.y);
    float inland=max(0.,c-xz.x);
    float h=inland*(0.02+0.02*n2(xz*0.01));
    h+=pow(max(0.,inland-40.)*0.01,2.)*25.0;
    return h;
}

float map(vec3 p){
    float c=coast(p.z);
    float beachW=20.+30.*n2(vec2(p.z*.01,2.));
    float ground=terrain(p.xz);

    float ocean=min(0.0,p.x-(c+beachW));
    ground=mix(ground,-1.0,step(0.0,ocean));

    return p.y-ground;
}

vec3 normal(vec3 p){
    vec2 e=vec2(.01,0);
    return normalize(vec3(
      map(p+e.xyy)-map(p-e.xyy),
      map(p+e.yxy)-map(p-e.yxy),
      map(p+e.yyx)-map(p-e.yyx)
    ));
}

float march(vec3 ro, vec3 rd){
    float d=0.;
    for(int i=0;i<140;i++){
        vec3 p=ro+rd*d;
        float h=map(p);
        if(abs(h)<.02) return d;
        d+=h*.7;
        if(d>3000.) break;
    }
    return -1.;
}

mat3 rotY(float a){
    float s=sin(a),c=cos(a);
    return mat3(c,0,s,0,1,0,-s,0,c);
}
mat3 rotX(float a){
    float s=sin(a),c=cos(a);
    return mat3(1,0,0,0,c,-s,0,s,c);
}

void main(){
    vec2 uv=(gl_FragCoord.xy-.5*R)/min(R.x,R.y);

    float yaw=move.x;
float pitch=move.y;

vec3 ro=vec3(0.,30.,T*18.0);

vec3 rd=normalize(vec3(uv,1.4));

rd=rotY(yaw)*rotX(pitch)*rd;

    vec3 col=mix(vec3(.70,.82,.95),vec3(.90,.95,1.),uv.y+.5);

    vec3 sunDir=normalize(vec3(.6,.35,.4));
    float sun=max(dot(rd,sunDir),0.0);
    col+=vec3(1.0,.85,.6)*pow(sun,500.);

    float d=march(ro,rd);
    if(d>0.){
        vec3 p=ro+rd*d;
        vec3 n=normal(p);

        float c=coast(p.z);
        float beachW=20.+30.*n2(vec2(p.z*.01,2.));

        vec3 base;
        if(p.x>c+beachW){
            base=vec3(.10,.36,.58);
            base+=0.05*sin(p.z*.3);
        }else if(p.x>c){
            base=vec3(.78,.70,.50);
        }else{
            base=vec3(.18,.36,.18);
        }

        float diff=max(dot(n,sunDir),0.);
        col=base*(0.35+0.65*diff);

        float haze=exp(-d*0.0015);
        col=mix(vec3(.75,.84,.92),col,haze);
    }

    O=vec4(col,1);
}
</script>

<script>
const c=document.getElementById('c');
const gl=c.getContext('webgl2');

function resize(){
 c.width=innerWidth;
 c.height=innerHeight;
 gl.viewport(0,0,c.width,c.height);
}
addEventListener('resize',resize); resize();

const vs=`#version 300 es
in vec2 p;
void main(){gl_Position=vec4(p,0,1);}`;

const fs=document.getElementById('frag').textContent;

function shader(type,src){
 const s=gl.createShader(type);
 gl.shaderSource(s,src);
 gl.compileShader(s);
 return s;
}

const prog=gl.createProgram();
gl.attachShader(prog,shader(gl.VERTEX_SHADER,vs));
gl.attachShader(prog,shader(gl.FRAGMENT_SHADER,fs));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

const loc=gl.getAttribLocation(prog,"p");
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

const uTime=gl.getUniformLocation(prog,"time");
const uRes=gl.getUniformLocation(prog,"resolution");
const uMove=gl.getUniformLocation(prog,"move");

let yaw=0;
let pitch=0;

let drag=false;
let lx=0;
let ly=0;

const MAX_PITCH=Math.PI*0.45;

c.onpointerdown=e=>{
 drag=true;
 lx=e.clientX;
 ly=e.clientY;
};

addEventListener("pointerup",()=>{
 drag=false;
});

addEventListener("pointermove",e=>{

 if(!drag) return;

 const dx=e.clientX-lx;
 const dy=e.clientY-ly;

 yaw += dx*0.004;

 pitch -= dy*0.004;

 if(pitch>MAX_PITCH) pitch=MAX_PITCH;
 if(pitch<-MAX_PITCH) pitch=-MAX_PITCH;

 lx=e.clientX;
 ly=e.clientY;
});

function frame(t){
 gl.uniform1f(uTime,t*0.001);
 gl.uniform2f(uRes,c.width,c.height);
 gl.uniform2f(uMove,yaw,pitch);
 gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
 requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
