<title>Lamp 56 - Forest</title>
<meta http-equiv="Expires" content="Tue, 04 Dec 1997 21:29:02 GMT">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Cache-Control" content="no-cache">

<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000}
canvas{width:100vw;height:100vh;display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>

<script id="frag" type="x-shader/x-fragment">#version 300 es
precision highp float;
out vec4 O;

uniform float time;
uniform vec2 resolution;
uniform vec2 look;

float h(float n){return fract(sin(n)*43758.5453);}

float n(vec2 p){
 vec2 i=floor(p),f=fract(p);
 f=f*f*(3.-2.*f);
 float a=h(dot(i,vec2(1.,57.)));
 float b=h(dot(i+vec2(1.,0.),vec2(1.,57.)));
 float c=h(dot(i+vec2(0.,1.),vec2(1.,57.)));
 float d=h(dot(i+vec2(1.,1.),vec2(1.,57.)));
 return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);
}

mat2 r(float a){float s=sin(a),c=cos(a);return mat2(c,-s,s,c);}

float coast(float z){
 return -45. + sin(z*.005)*18. + sin(z*.017)*8.;
}

float height(vec2 xz){
 float c=coast(xz.y);
 float inland=max(0.,c-xz.x);

 float hills = inland*0.03;
 hills += n(xz*0.002)*25.;

 return hills;
}

float oceanWaves(vec3 p){
 return p.y + 1.2 + sin(p.x*0.2 + time*1.5)*0.2 + sin(p.z*0.1)*0.15;
}

float forest(vec2 xz){

 float c = coast(xz.y);
 float beachW = 25. + 30.*n(vec2(xz.y*0.003,2.));

 // No trees on the beach
 if(xz.x > c && xz.x < c + beachW)
     return 1e5;

 vec2 id=floor(xz/14.);
 float rnd=h(dot(id,vec2(7.,113.)));
 if(rnd<0.78) return 1e5;

 vec2 p=fract(xz/14.)*14.-7.;
 float trunk=length(p)-0.4;
 float crown=length(vec3(p.x,3.,p.y))-3.5;
 return min(trunk,crown);
}

float highway(vec3 p){
 float c=coast(p.z);
 float lane = abs(p.x-(c-30. + sin(p.z*0.01)*10.)) - 1.2;
 float y = p.y + 0.2;
 return max(lane,y);
}

float map(vec3 p){
 float g = p.y - height(p.xz);

 float ocean = oceanWaves(p);
 float c=coast(p.z);
 float beachW=25. + 30.*n(vec2(p.z*0.003,2.));

 float sea = mix(1e5,ocean, step(c+beachW,p.x));

 float f = forest(p.xz);
 float h = highway(p);

 float d=min(g,sea);
 d=min(d,f);
 d=min(d,h);

 return d;
}

vec3 normal(vec3 p){
 vec2 e=vec2(.03,0);
 return normalize(vec3(
 map(p+e.xyy)-map(p-e.xyy),
 map(p+e.yxy)-map(p-e.yxy),
 map(p+e.yyx)-map(p-e.yyx)
 ));
}

float march(vec3 ro, vec3 rd){
 float d=0.;
 for(int i=0;i<160;i++){
  vec3 p=ro+rd*d;
  float s=map(p);
  if(abs(s)<.02) return d;
  d+=s*0.7;
  if(d>6000.) break;
 }
 return -1.;
}

vec3 shade(vec3 p, vec3 nrm, float d){
 vec3 sunDir=normalize(vec3(.6,.4,.3));

 float c=coast(p.z);
 float beachW=25. + 30.*n(vec2(p.z*0.003,2.));

 vec3 col;

 if(p.x>c+beachW){
    col=vec3(.18,.38,.20);
}else if(p.x>c){
    col=vec3(.80,.74,.56);
}else{
    col=vec3(.18,.38,.20);
}


 float diff=max(dot(nrm,sunDir),0.);
 col*=0.3+0.7*diff;

 float fog=exp(-d*0.0005);
 col=mix(vec3(.70,.80,.92),col,fog);

 return col;
}

void main(){
 vec2 uv=(gl_FragCoord.xy-.5*resolution)/min(resolution.x,resolution.y);

 float yaw=look.x*0.002;
 float pitch=look.y*0.002;

 vec3 ro=vec3(0.,35.,time*22.);

 vec3 rd=normalize(vec3(uv,1.4));
 rd.yz*=r(-pitch);
 rd.xz*=r(yaw);

 vec3 sky=mix(vec3(.65,.78,.92),vec3(.92,.96,1.),uv.y+.5);

 vec3 sunDir=normalize(vec3(.6,.4,.3));
 float sun=max(dot(rd,sunDir),0.);
 sky+=vec3(1.,.85,.6)*pow(sun,650.);

 float d=march(ro,rd);

 vec3 col=sky;

 if(d>0.){
  vec3 p=ro+rd*d;
  vec3 nrm=normal(p);
  col=shade(p,nrm,d);
 }

 O=vec4(col,1);
}
</script>

<script>
const c=document.getElementById('c');
const gl=c.getContext('webgl2');

function rs(){c.width=innerWidth;c.height=innerHeight;gl.viewport(0,0,c.width,c.height)}
addEventListener('resize',rs);rs();

const vs=`#version 300 es
in vec2 p;
void main(){gl_Position=vec4(p,0,1);}`;

function sh(t,s){let x=gl.createShader(t);gl.shaderSource(x,s);gl.compileShader(x);return x;}

const pr=gl.createProgram();
gl.attachShader(pr,sh(gl.VERTEX_SHADER,vs));
gl.attachShader(pr,sh(gl.FRAGMENT_SHADER,document.getElementById('frag').textContent));
gl.linkProgram(pr);
gl.useProgram(pr);

const b=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,b);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

const loc=gl.getAttribLocation(pr,'p');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

const uT=gl.getUniformLocation(pr,'time');
const uR=gl.getUniformLocation(pr,'resolution');
const uL=gl.getUniformLocation(pr,'look');

let mx=0,my=0,drag=false,lx=0,ly=0;

c.onpointerdown=e=>{drag=true;lx=e.clientX;ly=e.clientY;}
addEventListener('pointerup',()=>drag=false);
addEventListener('pointermove',e=>{
 if(!drag)return;
 mx+=e.clientX-lx;
 my+=e.clientY-ly;
 lx=e.clientX;ly=e.clientY;
});

function frame(t){
 gl.uniform1f(uT,t*0.001);
 gl.uniform2f(uR,c.width,c.height);
 gl.uniform2f(uL,mx,my);
 gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
 requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
