<title>Lamp 54 - ForestWall</title>
<meta http-equiv="Expires" content="Tue, 04 Dec 1997 21:29:02 GMT">

<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000}
canvas{width:100vw;height:100vh;display:block}
</style></head><body>
<canvas id="c"></canvas>
<script id="frag" type="x-shader/x-fragment">#version 300 es
precision highp float;
out vec4 O;
uniform vec2 resolution;
uniform float time;
uniform vec2 look;

float h(float n){return fract(sin(n)*43758.5453123);}
float n(vec2 p){
 vec2 i=floor(p),f=fract(p);
 f=f*f*(3.-2.*f);
 float a=h(dot(i,vec2(1,57)));
 float b=h(dot(i+vec2(1,0),vec2(1,57)));
 float c=h(dot(i+vec2(0,1),vec2(1,57)));
 float d=h(dot(i+vec2(1,1),vec2(1,57)));
 return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);
}
mat2 r(float a){float s=sin(a),c=cos(a);return mat2(c,-s,s,c);}

float coast(float z){
 return -40.+sin(z*.006)*15.+sin(z*.022)*7.;
}

float mountain(vec2 xz){
 float v=0.;
 v+=n(xz*.001)*500.;
 v+=n(xz*.002)*250.;
 v+=n(xz*.004)*100.;
 return v;
}

float terrain(vec2 xz){
 float c=coast(xz.y);
 float inland=max(0.,c-xz.x);
 float t=0.;

 if(inland>0.){
   t+=inland*.03;
   t+=mountain(vec2(xz.x*0.6,xz.y));
 }

 return t*.12;
}

float treeField(vec2 xz){
 vec2 g=floor(xz/18.);
 float rnd=h(dot(g,vec2(7.,113.)));
 if(rnd<.82) return 1e5;

 vec2 local=mod(xz,18.)-9.;
 float trunk=max(length(local)-0.4, abs(0.)-6.);
 float crown=length(vec3(local.x,4.,local.y))-4.5;
 return min(trunk,crown);
}

float lighthouse(vec3 p){
 vec3 q=p;
 q.x-=65.;
 q.z=mod(q.z+2000.,4000.)-2000.;
 float d=max(length(q.xz)-2.5,abs(q.y-8.)-8.);
 return d;
}

float map(vec3 p){
 float ground=p.y-terrain(p.xz);

 float c=coast(p.z);
 float beach=25.+45.*n(vec2(p.z*.003,4.));
 float oceanMask=step(c+beach,p.x);

 float ocean=p.y-(-1.+sin(p.z*.08+time*1.5)*.15);

 float d=min(ground,mix(1e5,ocean,oceanMask));

 if(p.x<c-10.){
   d=min(d,treeField(p.xz));
 }

 d=min(d,lighthouse(p));

 return d;
}

vec3 nor(vec3 p){
 vec2 e=vec2(.05,0);
 return normalize(vec3(
 map(p+e.xyy)-map(p-e.xyy),
 map(p+e.yxy)-map(p-e.yxy),
 map(p+e.yyx)-map(p-e.yyx)
 ));
}

float march(vec3 ro,vec3 rd){
 float d=0.;
 for(int i=0;i<180;i++){
   vec3 p=ro+rd*d;
   float s=map(p);
   if(abs(s)<.03)return d;
   d+=s*.75;
   if(d>5000.)break;
 }
 return -1.;
}

vec3 shade(vec3 p,vec3 nrm,float d){
 float c=coast(p.z);
 float beach=25.+45.*n(vec2(p.z*.003,4.));

 vec3 col;

 if(abs(p.y-(-1.))<1.0 && p.x>c+beach){
   col=vec3(.08,.35,.58);
 }else if(p.x>c){
   col=mix(vec3(.82,.76,.58),vec3(.62,.58,.45),smoothstep(c+beach-8.,c+beach,p.x));
 }else{
   col=vec3(.18,.38,.20);
 }

 if(p.x<c-10. && p.y<20.) col*=vec3(.7,.9,.7);

 vec3 sun=normalize(vec3(.55,.35,.45));
 float diff=max(dot(nrm,sun),0.);
 col*=0.35+0.65*diff;

 float haze=exp(-d*.0007);
 col=mix(vec3(.72,.82,.92),col,haze);
 return col;
}

void main(){
 vec2 uv=(gl_FragCoord.xy-.5*resolution)/min(resolution.x,resolution.y);

 float yaw=look.x*.002;
 float pitch=look.y*.002;

 vec3 ro=vec3(0.,30.,time*20.);
 vec3 rd=normalize(vec3(uv,1.5));

 rd.yz*=r(-pitch);
 rd.xz*=r(yaw);

 vec3 sky=mix(vec3(.65,.78,.92),vec3(.90,.95,1.),uv.y+.5);

 vec3 sunDir=normalize(vec3(.55,.35,.45));
 sky+=vec3(1.,.85,.65)*pow(max(dot(rd,sunDir),0.),700.);

 float clouds=n(vec2(rd.x*400.+time*.01,rd.y*30.));
 sky=mix(sky,vec3(1.),smoothstep(.82,.98,clouds)*.15);

 float d=march(ro,rd);
 vec3 col=sky;

 if(d>0.){
   vec3 p=ro+rd*d;
   vec3 nn=nor(p);
   col=shade(p,nn,d);
 }

 O=vec4(col,1);
}
</script>

<script>
const c=document.getElementById('c');
const gl=c.getContext('webgl2');
function rs(){c.width=innerWidth;c.height=innerHeight;gl.viewport(0,0,c.width,c.height)}
addEventListener('resize',rs);rs();

const vs=`#version 300 es
in vec2 p;
void main(){gl_Position=vec4(p,0,1);}`;

function sh(t,s){let x=gl.createShader(t);gl.shaderSource(x,s);gl.compileShader(x);return x;}
const pr=gl.createProgram();
gl.attachShader(pr,sh(gl.VERTEX_SHADER,vs));
gl.attachShader(pr,sh(gl.FRAGMENT_SHADER,document.getElementById('frag').textContent));
gl.linkProgram(pr);
gl.useProgram(pr);

const b=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,b);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const p=gl.getAttribLocation(pr,'p');
gl.enableVertexAttribArray(p);
gl.vertexAttribPointer(p,2,gl.FLOAT,false,0,0);

const uR=gl.getUniformLocation(pr,'resolution');
const uT=gl.getUniformLocation(pr,'time');
const uL=gl.getUniformLocation(pr,'look');

let lx=0,ly=0,d=false,x=0,y=0;
c.onpointerdown=e=>{d=true;lx=e.clientX;ly=e.clientY;}
addEventListener('pointerup',()=>d=false);
addEventListener('pointermove',e=>{
 if(!d)return;
 x+=e.clientX-lx;
 y+=e.clientY-ly;
 lx=e.clientX;ly=e.clientY;
});

function f(t){
 gl.uniform2f(uR,c.width,c.height);
 gl.uniform1f(uT,t*.001);
 gl.uniform2f(uL,x,y);
 gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
 requestAnimationFrame(f);
}
requestAnimationFrame(f);
</script>
