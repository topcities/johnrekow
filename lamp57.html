<title>Lamp 57 - SeasideFlat</title>
<meta http-equiv="Expires" content="Tue, 04 Dec 1997 21:29:02 GMT">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Cache-Control" content="no-cache">

<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000}
canvas{width:100vw;height:100vh;display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>

<script id="frag" type="x-shader/x-fragment">#version 300 es
precision highp float;
out vec4 O;

uniform float time;
uniform vec2 resolution;
uniform vec2 look;

float h(float n){return fract(sin(n)*43758.5453);}

float n(vec2 p){
 vec2 i=floor(p),f=fract(p);
 f=f*f*(3.-2.*f);
 float a=h(dot(i,vec2(1.,57.)));
 float b=h(dot(i+vec2(1.,0.),vec2(1.,57.)));
 float c=h(dot(i+vec2(0.,1.),vec2(1.,57.)));
 float d=h(dot(i+vec2(1.,1.),vec2(1.,57.)));
 return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);
}

mat2 r(float a){float s=sin(a),c=cos(a);return mat2(c,-s,s,c);}

float coast(float z){
 return -48. + sin(z*.0045)*20. + sin(z*.016)*9.;
}

float height(vec2 xz){
 float c=coast(xz.y);
 float inland=max(0.,c-xz.x);
 return inland*0.028 + n(xz*0.002)*28.;
}

float ocean(vec3 p){
 return p.y + 1.2 + sin(p.x*0.18 + time*1.3)*0.25 + sin(p.z*0.08)*0.18;
}

/* ---------- WORLD EVENTS ---------- */

float idhash(float n){return fract(sin(n*91.3458)*47453.5453);}

float bridge(vec3 p,float zc,float xc){
 vec3 q=p;
 q.z-=zc;
 q.x-=xc;
 float arch=abs(length(q.xz)-8.)-1.2;
 float deck=abs(q.y-6.)-0.8;
 return max(arch,deck);
}

float lighthouse(vec3 p,float zc){
 vec3 q=p;
 q.z-=zc;
 q.x-=65.;
 float body=max(length(q.xz)-2.2,abs(q.y-10.)-10.);
 return body;
}

float gasstation(vec3 p,float zc,float xc){
 vec3 q=p;
 q.z-=zc;
 q.x-=xc;
 float base=max(abs(q.x)-6.,abs(q.z)-4.);
 base=max(base,abs(q.y)-3.);
 float roof=max(abs(q.x)-7.,abs(q.z)-5.);
 roof=max(roof,abs(q.y-4.)-0.5);
 return min(base,roof);
}

float person(vec3 p,float zc,float xc){
 vec3 q=p;
 q.z-=zc;
 q.x-=xc;
 float body=max(length(q.xz)-0.4,abs(q.y-2.)-2.);
 float head=length(q-vec3(0,3.2,0))-0.35;
 return min(body,head);
}

float horse(vec3 p,float zc,float xc){
 vec3 q=p;
 q.z-=zc;
 q.x-=xc;
 float body=max(length(q.xz)-0.9,abs(q.y-1.5)-1.2);
 return body;
}

/* ---------- TERRAIN ---------- */

float terrain(vec2 xz){
 float c=coast(xz.y);
 float inland=max(0.,c-xz.x);
 return inland*0.03 + n(xz*0.0018)*30.;
}

/* ---------- SCENE MAP ---------- */

float map(vec3 p){

 float g = p.y - terrain(p.xz);

 float sea = ocean(p);
 float c=coast(p.z);
 float beach=28. + 34.*n(vec2(p.z*0.003,3.));

 float d=min(g, mix(1e5,sea, step(c+beach,p.x)));

 /* EVENT GRID */
 float zc=floor(p.z/180.)*180.;
 float r1=idhash(zc+1.);
 float r2=idhash(zc+2.);
 float r3=idhash(zc+3.);

 if(r1>.82){
   d=min(d,bridge(p,zc,c-35.));
 }
 if(r2>.88){
   d=min(d,lighthouse(p,zc));
 }
 if(r3>.86){
   d=min(d,gasstation(p,zc,c-25.));
 }
 if(r1>.92){
   d=min(d,person(p,zc,c-20.+10.*idhash(zc)));
 }
 if(r2>.94){
   d=min(d,horse(p,zc,c-15.+8.*idhash(zc+9.)));
 }

 return d;
}

/* ---------- NORMAL ---------- */

vec3 nor(vec3 p){
 vec2 e=vec2(.04,0);
 return normalize(vec3(
 map(p+e.xyy)-map(p-e.xyy),
 map(p+e.yxy)-map(p-e.yxy),
 map(p+e.yyx)-map(p-e.yyx)
 ));
}

/* ---------- MARCH ---------- */

float march(vec3 ro,vec3 rd){
 float d=0.;
 for(int i=0;i<180;i++){
  vec3 p=ro+rd*d;
  float s=map(p);
  if(abs(s)<.02) return d;
  d+=s*0.75;
  if(d>8000.) break;
 }
 return -1.;
}

/* ---------- SHADING ---------- */

vec3 shade(vec3 p,vec3 nrm,float d){

 vec3 sun=normalize(vec3(.6,.4,.3));

 float c=coast(p.z);
 float beach=28. + 34.*n(vec2(p.z*0.003,3.));

 vec3 col;

 if(p.x>c+beach) col=vec3(.07,.33,.56);
 else if(p.x>c) col=vec3(.82,.76,.58);
 else col=vec3(.18,.38,.20);

 float diff=max(dot(nrm,sun),0.);
 col*=0.25+0.75*diff;

 float fog=exp(-d*0.00045);
 col=mix(vec3(.70,.80,.92),col,fog);

 return col;
}

/* ---------- MAIN ---------- */

void main(){

 vec2 uv=(gl_FragCoord.xy-.5*resolution)/min(resolution.x,resolution.y);

 float yaw=look.x*0.002;
 float pitch=look.y*0.002;

 vec3 ro=vec3(0.,38.,time*24.);
 vec3 rd=normalize(vec3(uv,1.35));

 rd.yz*=mat2(cos(-pitch),-sin(-pitch),sin(-pitch),cos(-pitch));
 rd.xz*=mat2(cos(yaw),-sin(yaw),sin(yaw),cos(yaw));

 vec3 sky=mix(vec3(.65,.78,.92),vec3(.92,.96,1.),uv.y+.5);

 vec3 sun=normalize(vec3(.6,.4,.3));
 float s=max(dot(rd,sun),0.);
 sky+=vec3(1.,.85,.6)*pow(s,700.);

 float d=march(ro,rd);

 vec3 col=sky;

 if(d>0.){
  vec3 p=ro+rd*d;
  vec3 nrm=nor(p);
  col=shade(p,nrm,d);
 }

 O=vec4(col,1);
}
</script>

<script>
const c=document.getElementById('c');
const gl=c.getContext('webgl2');

function rs(){c.width=innerWidth;c.height=innerHeight;gl.viewport(0,0,c.width,c.height)}
addEventListener('resize',rs);rs();

const vs=`#version 300 es
in vec2 p;
void main(){gl_Position=vec4(p,0,1);}`;

function sh(t,s){let x=gl.createShader(t);gl.shaderSource(x,s);gl.compileShader(x);return x;}

const pr=gl.createProgram();
gl.attachShader(pr,sh(gl.VERTEX_SHADER,vs));
gl.attachShader(pr,sh(gl.FRAGMENT_SHADER,document.getElementById('frag').textContent));
gl.linkProgram(pr);
gl.useProgram(pr);

const b=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,b);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

const loc=gl.getAttribLocation(pr,'p');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

const uT=gl.getUniformLocation(pr,'time');
const uR=gl.getUniformLocation(pr,'resolution');
const uL=gl.getUniformLocation(pr,'look');

let mx=0,my=0,drag=false,lx=0,ly=0;

c.onpointerdown=e=>{drag=true;lx=e.clientX;ly=e.clientY;}
addEventListener('pointerup',()=>drag=false);
addEventListener('pointermove',e=>{
 if(!drag)return;
 mx+=e.clientX-lx;
 my+=e.clientY-ly;
 lx=e.clientX;ly=e.clientY;
});

function frame(t){
 gl.uniform1f(uT,t*0.001);
 gl.uniform2f(uR,c.width,c.height);
 gl.uniform2f(uL,mx,my);
 gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
 requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
